<!DOCTYPE html>
<html>

<head>

<title>Friend AI</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#chatBox{
margin-top:40px;
}

input{
padding:10px;
width:70%;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h2>Friend AI Chat</h2>

<div id="chatBox">

<input id="msg" placeholder="Talk to your AI friend">

<button onclick="send()">Send</button>

</div>

<p id="reply"></p>

<script>

async function send(){

const text = document.getElementById("msg").value;

const res = await fetch("YOUR_NGROK_URL/ai?text="+text);

const data = await res.text();

document.getElementById("reply").innerText = data;

}

</script>

</body>

</html>
