<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Subtitle Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      margin: 15px 0;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: orange;
      cursor: pointer;
    }

    video {
      width: 100%;
      max-width: 700px;
      margin-top: 20px;
      border-radius: 10px;
      background: black;
    }

    #subtitles {
      margin-top: 20px;
      font-size: 20px;
      color: #00ff99;
      min-height: 40px;
      word-wrap: break-word;
    }

  </style>
</head>
<body>

  <h1>🎤 AI Subtitle Generator (English Output)</h1>

  <input type="file" id="videoInput" accept="video/*">

  <br>

  <button id="processBtn">Generate Subtitles</button>

  <br>

  <video id="video" controls></video>

  <div id="subtitles">Loading model...</div>

  <!-- IMPORTANT -->
  <script type="module" src="./app.js"></script>

</body>
</html>
