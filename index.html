<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Subtitle Generator</title>

<style>

body{
font-family: Arial;
text-align:center;
padding:20px;
background:#f4f4f4;
}

.videoBox{
position:relative;
display:inline-block;
}

video{
width:600px;
max-width:95%;
}

.subtitle{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
color:white;
padding:8px 14px;
font-size:20px;
border-radius:6px;
max-width:90%;
}

textarea{
width:600px;
max-width:95%;
height:150px;
margin-top:15px;
}

button{
padding:10px 20px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>AI Video Subtitle Generator</h2>

<input type="file" id="videoInput" accept="video/*"><br><br>

<div class="videoBox">

<video id="video" controls></video>

<div id="subtitleBox" class="subtitle"></div>

</div>

<br>

<button id="generateBtn">Generate Subtitles</button>

<br>

<textarea id="editor"></textarea>

<script type="module" src="app.js"></script>

</body>
</html>
