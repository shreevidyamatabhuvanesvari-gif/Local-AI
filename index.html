<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Subtitle System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }

    video {
      width: 100%;
      max-width: 600px;
      margin: 20px 0;
    }

    #subtitles {
      width: 100%;
      max-width: 600px;
      height: 150px;
      margin: 10px auto;
      padding: 10px;
      border: 1px solid #ccc;
      background: white;
      text-align: left;
      overflow-y: auto;
    }

    textarea {
      width: 100%;
      max-width: 600px;
      height: 150px;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>AI Video Transcription System</h2>

  <input type="file" id="videoInput" accept="video/*">
  <br>

  <video id="video" controls></video>
  <br>

  <button id="processBtn">Generate</button>

  <div id="subtitles">Loading AI model...</div>

  <textarea id="editor" placeholder="Editable transcription will appear here..."></textarea>
  <br>

  <button id="copyBtn">Copy Text</button>
  <button id="downloadBtn">Download TXT</button>

  <script type="module" src="app.js"></script>

</body>
</html>
