<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Video Speech AI</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

video{
width:95%;
max-width:500px;
margin-top:20px;
border-radius:10px;
}

button{
padding:12px;
margin:10px;
font-size:16px;
}

#subtitles{
margin-top:15px;
font-size:18px;
color:#00ffcc;
padding:10px;
}

</style>

</head>

<body>

<h2>Video Speech AI</h2>

<!-- Video from Gallery -->
<input 
type="file"
id="videoInput"
accept="video/*"
capture="environment"
>

<br>

<video id="video" controls></video>

<br>

<button id="generateBtn">
Generate Subtitles
</button>

<button onclick="openFriend()">
Friend Chat
</button>

<div id="subtitles">
Subtitles will appear here
</div>

<script src="app.js" type="module"></script>

<script>

const videoInput=document.getElementById("videoInput");
const video=document.getElementById("video");

videoInput.addEventListener("change",function(){

const file=this.files[0];

if(file){

video.src=URL.createObjectURL(file);

video.load();

}

});

function openFriend(){

window.location.href="friend.html";

}

</script>

</body>

</html>
