<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hindi Subtitle Generator</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 30px;
    }

    button {
      background: orange;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 15px;
    }

    video {
      width: 100%;
      max-width: 700px;
      margin-top: 25px;
      border-radius: 10px;
    }

    #subtitles {
      margin-top: 20px;
      font-size: 22px;
      color: #00ff99;
      min-height: 40px;
    }

  </style>
</head>

<body>

  <h1>🎤 Hindi Subtitle Generator</h1>

  <input type="file" id="videoInput" accept="video/*" />

  <br/>

  <button id="processBtn">Generate Subtitles</button>

  <br/>

  <video id="video" controls></video>

  <div id="subtitles">Model loading...</div>

  <script type="module" src="./app.js"></script>

</body>
</html>
