<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Subtitle AI</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#videoContainer{
position:relative;
width:95%;
max-width:500px;
margin:auto;
}

video{
width:100%;
border-radius:10px;
}

#subtitles{
position:absolute;
bottom:15px;
left:0;
right:0;
text-align:center;
font-size:20px;
color:#00ffcc;
background:rgba(0,0,0,0.6);
padding:6px;
}

button{
margin:10px;
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h2>Video Subtitle AI</h2>

<input 
type="file"
id="videoInput"
accept="video/*"
>

<br><br>

<div id="videoContainer">

<video id="video" controls></video>

<div id="subtitles">
Subtitles will appear here
</div>

</div>

<br>

<button id="generateBtn">
Generate Subtitles
</button>

<button onclick="openFriend()">
Friend Chat
</button>

<script>

const videoInput=document.getElementById("videoInput");
const video=document.getElementById("video");

videoInput.addEventListener("change",function(){

const file=this.files[0];

if(file){

video.src=URL.createObjectURL(file);
video.load();

}

});

function openFriend(){

window.location.href="friend.html";

}

</script>

<script type="module" src="app.js"></script>

</body>

</html>
